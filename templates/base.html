<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <title>Barbertime</title>
    {% block head %}
    {% endblock %}
</head>
<body>
    <header class="navbar-header">
        <div class="navbar-container">
            
            <div class="navbar-logo">
                <a href="#">Barbearia Elite</a>
            </div>

            <input type="checkbox" id="menu-toggle" class="menu-checkbox">

            <label for="menu-toggle" class="menu-icones">
                <span class="hamburger">≡</span>
                <span class="fechar">✕</span>
            </label>

            <label for="menu-toggle" class="menu-overlay"></label>

            <div class="navbar-links-wrapper">

            <nav class="navbar-menu">
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Serviços</a></li>
                    <li><a href="#">Barbeiros</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </nav>

            <div class="navbar-acoes">
                <a href="#" class="btn-entrar">Entrar</a>
                <a href="#" class="btn-agendar-nav">Agendar Horário</a>
            </div>

        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>

    </footer>
</body>
</html>
